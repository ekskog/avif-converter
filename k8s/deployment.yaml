apiVersion: apps/v1
kind: Deployment
metadata:
  name: avif-converter
  namespace: webapps
  labels:
    app: avif-converter
spec:
  replicas: 1
  revisionHistoryLimit: 0  # Keep zero old ReplicaSets - no rollbacks needed
  selector:
    matchLabels:
      app: avif-converter
  template:
    metadata:
      labels:
        app: avif-converter
    spec:
      containers:
      - name: avif-converter
        image: ghcr.io/ekskog/avif-converter:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 1800  # 30 minutes
          periodSeconds: 60
          timeoutSeconds: 1800  # 30 minutes
          failureThreshold: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 1800  # 30 minutes
          periodSeconds: 30
          timeoutSeconds: 1800  # 30 minutes
          failureThreshold: 1
        volumeMounts:
        - name: temp-storage
          mountPath: /app/uploads
        - name: temp-storage
          mountPath: /app/temp-output
      volumes:
      - name: temp-storage
        emptyDir:
          sizeLimit: 5Gi
