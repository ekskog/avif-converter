apiVersion: apps/v1
kind: Deployment
metadata:
  name: avif-converter
  namespace: webapps
  labels:
    app: avif-converter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avif-converter
  template:
    metadata:
      labels:
        app: avif-converter
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: avif-converter
        image: ghcr.io/ekskog/avif-converter:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: temp-storage
          mountPath: /app/uploads
        - name: temp-storage
          mountPath: /app/temp-output
      volumes:
      - name: temp-storage
        emptyDir:
          sizeLimit: 5Gi
